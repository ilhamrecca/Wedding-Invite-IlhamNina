  <path class="leaf" d="M75 170c-19-5-31-18-36-39 22 3 36 15 43 34-2 2-4 4-7 5Z" />
  <path class="leaf" d="M143 148c18 7 29 22 32 42-22-4-36-17-41-38 3-2 6-3 9-4Z" />
  <path class="leaf" d="M118 126c-20-7-32-23-34-45 22 5 36 19 42 40-3 2-5 4-8 5Z" />
  <path class="leaf" d="M160 84c22-8 39-3 55 14-21 11-40 7-58-9 1-2 2-4 3-5Z" />
  <path class="leaf" d="M73 76c-18-11-26-29-23-51 21 9 32 25 31 48-3 1-5 2-8 3Z" />
  <circle class="dot" cx="31" cy="156" r="4" />
  <circle class="dot" cx="99" cy="181" r="3" />
  <circle class="dot" cx="139" cy="107" r="3.5" />
  <circle class="dot" cx="188" cy="61" r="3" />
</svg>
