<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="bottom left floral ornament">
  <style>
    :root {
      --gold: #b88a2d;
      --soft: #f4e6c8;
    }
    .line {
      fill: none;
      stroke: var(--gold);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 760;
      stroke-dashoffset: 760;
      animation: draw 2.6s ease forwards;
    }
    .leaf {
      fill: var(--soft);
      fill-opacity: 0;
      stroke: var(--gold);
      stroke-width: 1.8;
      stroke-dasharray: 180;
      stroke-dashoffset: 180;
      animation: draw 2.4s ease forwards, fillLeaf 900ms ease forwards 1.4s;
    }
    .dot {
      fill: var(--gold);
      opacity: 0;
      animation: pop 600ms ease forwards 1.9s;
    }
    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }
    @keyframes fillLeaf {
      to {
        fill-opacity: 0.82;
      }
    }
    @keyframes pop {
      to {
        opacity: 1;
      }
    }
  </style>
  <path class="line" d="M5 206h153c46 0 86-23 106-59" />
